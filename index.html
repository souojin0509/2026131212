<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 공부 성향 테스트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-orb orb-one"></div>
  <div class="background-orb orb-two"></div>

  <main class="app">
    <section id="start-screen" class="screen active">
      <div class="hero-card glass">
        <p class="eyebrow">Study Type Test</p>
        <h1>나의 공부 성향 테스트</h1>
        <p class="intro">
          8개의 질문에 답하고 나에게 가장 잘 맞는 공부 방식을 확인해보세요.
        </p>

        <label class="nickname-label" for="nickname-input">닉네임</label>
        <input
          id="nickname-input"
          class="nickname-input"
          type="text"
          placeholder="예: 수진"
          maxlength="12"
        />

        <button id="start-btn" class="primary-btn">테스트 시작하기</button>
      </div>
    </section>

    <section id="quiz-screen" class="screen">
      <div class="quiz-card glass">
        <div class="top-row">
          <span class="chip">Question</span>
          <span class="count"><span id="question-number">1</span> / <span id="total-number">8</span></span>
        </div>

        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>

        <div id="question-wrap" class="question-wrap">
          <h2 id="question-title"></h2>
          <div id="answer-list" class="answer-list"></div>
        </div>
      </div>
    </section>

    <section id="result-screen" class="screen">
      <div id="result-card" class="result-card">
        <p class="eyebrow">Result Card</p>
        <h1 id="result-title"></h1>
        <p id="result-desc" class="result-desc"></p>

        <div class="result-grid">
          <div class="info-box">
            <h3>공부 팁</h3>
            <ul id="result-tips"></ul>
          </div>

          <div class="info-box">
            <h3>어울리는 공부 장소</h3>
            <p id="result-place"></p>
          </div>
        </div>

        <div class="button-row">
          <button id="restart-btn" class="secondary-btn">다시 하기</button>
          <button id="copy-btn" class="primary-btn">링크 복사</button>
        </div>

        <p id="copy-message" class="copy-message">링크가 복사되었습니다!</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
