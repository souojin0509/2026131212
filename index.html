<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 공부 성향 테스트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="start-screen" class="card active">
      <p class="eyebrow">Study Type Test</p>
      <h1>나의 공부 성향 테스트</h1>
      <p class="intro">
        나는 어떤 방식으로 공부할 때 가장 잘 맞을까?
        8개의 질문에 답하고 나만의 공부 성향을 확인해보세요.
      </p>
      <button id="start-btn" class="primary-btn">테스트 시작하기</button>
    </section>

    <section id="quiz-screen" class="card">
      <div class="progress-wrap">
        <div class="progress-text">
          <span id="question-number">1</span> / <span id="total-number">8</span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </div>

      <h2 id="question-title"></h2>
      <div id="answer-list" class="answer-list"></div>
    </section>

    <section id="result-screen" class="card">
      <p class="eyebrow">Your Result</p>
      <h1 id="result-title"></h1>
      <p id="result-desc" class="result-desc"></p>

      <div class="result-box">
        <h3>공부 팁</h3>
        <ul id="result-tips"></ul>
      </div>

      <div class="result-box">
        <h3>어울리는 공부 장소</h3>
        <p id="result-place"></p>
      </div>

      <button id="restart-btn" class="primary-btn">다시 테스트하기</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
